version: "3.9"

services:
  app:
    build: .
    container_name: ai-chat-api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://denys:mysecretpassword@postgres:5432/ai_chat
    restart: always

  postgres:
    image: postgres:15
    container_name: ai-chat-db
    environment:
      POSTGRES_USER: denys
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: ai_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  qdrant:
    image: qdrant/qdrant
    container_name: ai-chat-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

volumes:
  postgres_data:
  qdrant_storage:
